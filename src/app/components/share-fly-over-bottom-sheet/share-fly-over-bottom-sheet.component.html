<ng-container *transloco="let t; lang: lang; prefix: 'pages.activities'">
  <div class="preview-container">
    <video #videoPlayer controls width="384px"></video>
  </div>

  <mat-nav-list>
    <a mat-list-item (click)="onShareClicked()">
      <span
        class="material-symbols-outlined"
        style="vertical-align: bottom; margin-right: 8px"
        >share</span
      >
      {{ t("actions.share-fly-over-video") }}
    </a>
  </mat-nav-list>
</ng-container>
